<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#FBF4E9" />
  <title>StitchMind · Find your next project</title>

  <script>
    window.GA_MEASUREMENT_ID = 'G-CTD14EQRW9';
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    (function () {
      var id = window.GA_MEASUREMENT_ID;
      if (!id || id.indexOf('G-') !== 0 || id === 'G-XXXXXXXXXX') return;
      var s = document.createElement('script');
      s.async = true; s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', id, { transport_type: 'beacon' });
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --cream:#FBF4E9; --peach:#FFF7EC; --linen:#F5E6CC;
      --ink:#2C2316; --soft:#695B45; --muted:#A8977C;
      --coral:#F08C00; --coral-deep:#E8590C; --pink:#FFC078; --ochre:#FAB005;
      --paper:#FFFFFF; --hairline:#F0E2CB;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{
      margin:0; min-height:100svh; overflow-x:hidden;
      font-family:"Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:var(--ink);
      background:radial-gradient(1100px 620px at 50% -12%, #FFFCF6 0%, var(--peach) 38%, var(--cream) 70%, var(--linen) 100%);
      display:flex; align-items:flex-start; justify-content:center;
      padding:clamp(20px,5vw,48px) 20px;
    }
    .bg{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;}
    .blob{position:absolute; border-radius:50%; filter:blur(60px); opacity:.40; will-change:transform;}
    .b1{width:340px;height:340px;background:var(--coral);  top:-90px;  left:-70px;  animation:drift 16s ease-in-out infinite;}
    .b2{width:300px;height:300px;background:var(--pink);   bottom:-90px; right:-60px; animation:drift 19s ease-in-out infinite reverse;}
    .b3{width:220px;height:220px;background:var(--ochre); opacity:.30; top:42%; right:-80px; animation:drift 22s ease-in-out infinite;}
    .b4{width:200px;height:200px;background:var(--coral); opacity:.16; bottom:16%; left:-70px; animation:drift 18s ease-in-out infinite reverse;}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(26px,-30px) scale(1.08);}}

    .wrap{position:relative; z-index:1; width:100%; max-width:480px;}
    .qhead{display:flex; flex-direction:column; gap:14px; margin-bottom:26px;}
    .brand{display:flex; align-items:center; justify-content:center; gap:9px; font-weight:800; letter-spacing:-.3px; font-size:17px;}
    .brand img{width:30px; height:30px; border-radius:9px; box-shadow:0 6px 14px rgba(232,89,12,.22);}
    .progress{position:relative; height:9px; border-radius:100px; background:#F0E2CB; overflow:hidden; box-shadow:inset 0 1px 2px rgba(44,35,22,.06);}
    .bar{position:absolute; inset:0 auto 0 0; width:0%; border-radius:100px; background:linear-gradient(90deg,var(--ochre),var(--coral-deep)); transition:width .5s cubic-bezier(.4,.9,.3,1);}
    .step-count{text-align:center; font-size:12.5px; font-weight:600; color:var(--muted); letter-spacing:.3px;}

    .stage{position:relative;}
    .card{will-change:transform,opacity;}
    .card.exit{opacity:0; transform:translateY(-14px); transition:opacity .2s ease, transform .2s ease;}
    .eyebrow{display:block; text-align:center; font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--coral-deep); margin-bottom:10px;}
    h1{margin:0 auto 8px; max-width:14ch; text-align:center; font-weight:800; letter-spacing:-.8px; line-height:1.12; font-size:clamp(25px,6.6vw,34px);}
    h1 .grad{background:linear-gradient(100deg,var(--coral),var(--coral-deep)); -webkit-background-clip:text; background-clip:text; color:transparent;}
    .qsub{margin:0 auto 24px; max-width:30ch; text-align:center; color:var(--soft); font-size:14.5px; line-height:1.5;}

    .opts{display:flex; flex-direction:column; gap:12px;}
    .opt{display:flex; align-items:center; gap:14px; width:100%; text-align:left; cursor:pointer;
      background:var(--paper); border:1.5px solid var(--hairline); border-radius:18px; padding:17px 18px;
      font-family:inherit; font-size:16px; font-weight:600; color:var(--ink); box-shadow:0 6px 16px rgba(44,35,22,.05);
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease, background .14s ease;
      opacity:0; transform:translateY(14px); animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards;}
    .opt:hover{transform:translateY(-2px); box-shadow:0 12px 26px rgba(44,35,22,.10); border-color:#EAD3A8;}
    .opt:active{transform:scale(.985);}
    .opt .emoji{width:42px; height:42px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:22px; background:var(--peach); border-radius:13px;}
    .opt .arrow{margin-left:auto; color:var(--muted); transition:transform .14s ease, color .14s ease;}
    .opt:hover .arrow{color:var(--coral); transform:translateX(3px);}
    .opt.selected{border-color:var(--coral); background:linear-gradient(180deg,#FFF,#FFF6E9); box-shadow:0 14px 30px rgba(240,140,0,.22);}
    .opt.selected .emoji{background:var(--coral); color:#fff;}
    .opt.selected .arrow{color:var(--coral);}
    @keyframes rise{to{opacity:1; transform:translateY(0);}}

    .trust{margin-top:24px; text-align:center; font-size:12.5px; color:var(--muted);}
    .trust .s{color:var(--ochre); letter-spacing:1px;}

    /* Insight interstitial */
    .insight{text-align:center; padding-top:6px;}
    .insight .ibadge{width:78px; height:78px; margin:4px auto 18px; display:flex; align-items:center; justify-content:center;
      font-size:34px; border-radius:24px; background:linear-gradient(160deg,#FFF3DC,#FFE3B8);
      box-shadow:0 14px 34px rgba(240,140,0,.22); animation:pop .5s cubic-bezier(.2,.8,.3,1.2) both;}
    @keyframes pop{from{opacity:0; transform:scale(.8);}to{opacity:1; transform:scale(1);}}
    .insight .icont{display:inline-flex; align-items:center; gap:8px; margin:18px auto 0; padding:13px 22px; border:none; cursor:pointer;
      font-family:inherit; font-weight:700; font-size:16px; color:#fff; border-radius:100px;
      background:linear-gradient(100deg,var(--coral),var(--coral-deep)); box-shadow:0 12px 26px rgba(232,89,12,.30);
      transition:transform .14s ease, box-shadow .14s ease;}
    .insight .icont:hover{transform:translateY(-2px); box-shadow:0 16px 32px rgba(232,89,12,.36);}
    .insight .icont:active{transform:scale(.97);}

    .finish{text-align:center; padding-top:18px;}
    .spinner{width:74px; height:74px; margin:6px auto 22px; position:relative;}
    .spinner::before{content:""; position:absolute; inset:0; border-radius:50%; border:5px solid #F3E2C4; border-top-color:var(--coral); animation:spin .9s linear infinite;}
    .spinner .gn{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:30px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .finish h1{max-width:18ch;}
    .finish .dots{display:inline-flex; gap:6px; margin-top:6px;}
    .finish .dots i{width:7px; height:7px; border-radius:50%; background:var(--coral); opacity:.4; animation:blink 1.2s infinite;}
    .finish .dots i:nth-child(2){animation-delay:.2s;} .finish .dots i:nth-child(3){animation-delay:.4s;}
    @keyframes blink{0%,100%{opacity:.35; transform:scale(.9);}50%{opacity:1; transform:scale(1.15);}}

    @media (prefers-reduced-motion: reduce){
      .blob,.opt,.bar,.spinner::before,.finish .dots i,.insight .ibadge{animation:none !important; transition:none !important;}
      .opt{opacity:1; transform:none;}
    }
  </style>
</head>
<body>
  <div class="bg"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="blob b4"></span></div>

  <main class="wrap">
    <div class="qhead">
      <div class="brand"><img src="/img/icon.png" alt="StitchMind"> StitchMind</div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="step-count" id="stepCount"></div>
    </div>
    <section class="stage" id="stage"></section>
  </main>

  <script>
    var VARIANT = "project";
    var REDIRECT = "/invite";
    // Steps mix questions (type 'q') with an insight interstitial (type 'insight').
    var STEPS = [
      {
        type: "q",
        eyebrow: "Let's find it",
        q: ["What's ", '<span class="grad">calling your name</span>?'],
        opts: [
          { emoji: "🧸", label: "Amigurumi & toys" },
          { emoji: "🏠", label: "Home decor" },
          { emoji: "👶", label: "Baby items" },
          { emoji: "👜", label: "Bags & accessories" }
        ]
      },
      {
        type: "q",
        eyebrow: "Your aesthetic",
        q: ['Pick your ', '<span class="grad">vibe</span>'],
        opts: [
          { emoji: "🌈", label: "Bright & playful" },
          { emoji: "🤎", label: "Cozy neutrals" },
          { emoji: "🌸", label: "Soft pastels" },
          { emoji: "🖤", label: "Bold & modern" }
        ]
      },
      {
        type: "q",
        eyebrow: "Be realistic",
        q: ['How much ', '<span class="grad">time</span> do you have?'],
        opts: [
          { emoji: "⚡", label: "A quick win" },
          { emoji: "🌙", label: "A few evenings" },
          { emoji: "📅", label: "A week or two" },
          { emoji: "🏔️", label: "A big project" }
        ]
      },
      {
        type: "insight",
        emoji: "✨",
        eyebrow: "Good news",
        title: ['We found ', '<span class="grad">120+ patterns</span> for you'],
        sub: "All matched to your style and your free time. Two quick questions and they're yours.",
        cta: "See what's next"
      },
      {
        type: "q",
        eyebrow: "Materials",
        q: ['Which yarn do you ', '<span class="grad">reach for</span>?'],
        opts: [
          { emoji: "🧶", label: "Cotton" },
          { emoji: "🐑", label: "Wool" },
          { emoji: "☁️", label: "Chunky / blanket yarn" },
          { emoji: "🎀", label: "Whatever's pretty" }
        ]
      },
      {
        type: "q",
        eyebrow: "Last one",
        q: ['Where do you usually ', '<span class="grad">get stuck</span>?'],
        sub: "We've got a tool for each.",
        opts: [
          { emoji: "🔍", label: "Finding the right pattern" },
          { emoji: "📖", label: "Understanding it" },
          { emoji: "🔢", label: "Counting rows" },
          { emoji: "🎯", label: "Actually finishing" }
        ]
      }
    ];

    var TOTAL_Q = STEPS.filter(function(s){ return s.type === 'q'; }).length;

    var stage = document.getElementById('stage');
    var bar = document.getElementById('bar');
    var stepCount = document.getElementById('stepCount');
    var answers = [];
    var i = 0;        // index into STEPS
    var qDone = 0;    // questions answered so far
    var locked = false;

    try { gtag('event', 'quiz_start', { quiz_variant: VARIANT, transport_type: 'beacon' }); } catch (e) {}

    function setProgress(){
      bar.style.width = Math.round((qDone / TOTAL_Q) * 100) + '%';
      stepCount.textContent = Math.min(qDone + 1, TOTAL_Q) + ' / ' + TOTAL_Q;
    }

    function next(){
      i++;
      locked = false;
      if (i < STEPS.length) render();
      else finish();
    }

    function render(){
      var S = STEPS[i];
      if (S.type === 'insight'){ renderInsight(S); return; }
      setProgress();
      var html = '<div class="card" id="card">'
        + '<span class="eyebrow">' + S.eyebrow + '</span>'
        + '<h1>' + S.q.join('') + '</h1>'
        + (S.sub ? '<p class="qsub">' + S.sub + '</p>' : '')
        + '<div class="opts">';
      S.opts.forEach(function(o, idx){
        html += '<button class="opt" data-idx="' + idx + '" style="animation-delay:' + (idx * 70 + 60) + 'ms">'
          + '<span class="emoji">' + o.emoji + '</span>'
          + '<span class="lbl">' + o.label + '</span>'
          + '<svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>'
          + '</button>';
      });
      html += '</div>'
        + '<div class="trust"><span class="s">★★★★★</span> 120,000+ patterns explored this month</div>'
        + '</div>';
      stage.innerHTML = html;

      var card = document.getElementById('card');
      stage.querySelectorAll('.opt').forEach(function(btn){
        btn.addEventListener('click', function(){
          if (locked) return;
          locked = true;
          btn.classList.add('selected');
          qDone++;
          var ans = btn.querySelector('.lbl').textContent;
          try { gtag('event', 'quiz_answer', { quiz_variant: VARIANT, question: qDone, answer: ans, transport_type: 'beacon' }); } catch (e) {}
          setProgress();
          setTimeout(function(){
            card.classList.add('exit');
            setTimeout(next, 220);
          }, 260);
        });
      });
    }

    function renderInsight(S){
      var html = '<div class="card insight" id="card">'
        + '<div class="ibadge">' + S.emoji + '</div>'
        + '<span class="eyebrow">' + S.eyebrow + '</span>'
        + '<h1>' + S.title.join('') + '</h1>'
        + '<p class="qsub">' + S.sub + '</p>'
        + '<button class="icont" id="icont">' + S.cta
        + '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>'
        + '</div>';
      stage.innerHTML = html;
      var card = document.getElementById('card');
      document.getElementById('icont').addEventListener('click', function(){
        if (locked) return; locked = true;
        try { gtag('event', 'quiz_insight', { quiz_variant: VARIANT, transport_type: 'beacon' }); } catch (e) {}
        card.classList.add('exit');
        setTimeout(next, 220);
      });
    }

    function finish(){
      bar.style.width = '100%';
      stepCount.textContent = TOTAL_Q + ' / ' + TOTAL_Q;
      try { gtag('event', 'quiz_complete', { quiz_variant: VARIANT, transport_type: 'beacon' }); } catch (e) {}
      stage.innerHTML = '<div class="card finish" id="card">'
        + '<div class="spinner"><span class="gn">🧶</span></div>'
        + '<span class="eyebrow">All set</span>'
        + '<h1>Your <span class="grad">project picks</span> are ready</h1>'
        + '<p class="qsub">Patterns matched to your style, plus lessons and a row counter to finish them. Taking you to the app<span class="dots"><i></i><i></i><i></i></span></p>'
        + '</div>';
      setTimeout(function(){ location.replace(REDIRECT); }, 2100);
    }

    render();
  </script>
</body>
</html>
